<!DOCTYPE html>
<html>
<head>
    <title>Create Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card p-4">

        <h3>Enter Polling Unit Results</h3>

        <form method="POST">
            {% csrf_token %}

            <label>Polling Unit</label>
            <select name="polling_unit" class="form-select mb-3" required>
                {% for pu in polling_units %}
                    <option value="{{ pu.uniqueid }}">
                        {{ pu.polling_unit_name }}
                    </option>
                {% endfor %}
            </select>

            <label>PDP</label>
            <input type="number" name="PDP" class="form-control mb-2">

            <label>APC</label>
            <input type="number" name="APC" class="form-control mb-2">

            <label>LP</label>
            <input type="number" name="LP" class="form-control mb-2">

            <label>NNPP</label>
            <input type="number" name="NNPP" class="form-control mb-3">

            <button class="btn btn-primary">Submit Results</button>
        </form>

    </div>

</div>

</body>
</html>
