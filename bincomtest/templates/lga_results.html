<!DOCTYPE html>
<html>
<head>
    <title>LGA Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card p-4 mb-4">
        <h3>LGA Total Results</h3>

        <form method="POST">
            {% csrf_token %}

            <label class="form-label">Select LGA</label>

            <select name="lga_id" class="form-select mb-3">
                <option disabled selected>-- Select LGA --</option>

                {% for lga in lgas %}
                    <option value="{{ lga.uniqueid }}">
                        {{ lga.lga_name }}
                    </option>
                {% endfor %}
            </select>

            <button class="btn btn-primary">Get Results</button>
        </form>
    </div>

    {% if results %}

    <div class="card p-4">
        <h5>Total Results</h5>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Party</th>
                    <th>Total Score</th>
                </tr>
            </thead>

            <tbody>
                {% for r in results %}
                <tr>
                    <td>{{ r.party_abbreviation }}</td>
                    <td>{{ r.total_score }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    {% else %}
    <div class="card p-4">

        <table class="table table-striped">
            <tbody>
                <tr>
                   No result Found for {{selected_lga.lga_name}}
                </tr>

            </tbody>
        </table>
    </div>

    {% endif %}

</div>

</body>
</html>
