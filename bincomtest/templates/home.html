<!DOCTYPE html>
<html>
<head>
    <title>Polling Unit Selector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            Election Dashboard
        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link text-white" href="{% url 'home' %}">
                Home
            </a>

            <a class="nav-link text-white" href="{% url 'lga_results' %}">
                LGA Results
            </a>

            <a class="nav-link text-white" href="{% url 'create_results' %}">
                Enter Results
            </a>

        </div>

    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container py-5">

    <div class="card p-4 shadow-sm">
        <h3>Select Polling Unit</h3>

        <form method="POST">
            {% csrf_token %}

            <label class="form-label mt-3">Polling Unit</label>

            <select name="polling_unit" class="form-select" required>
                <option value="" disabled selected>Choose...</option>

                {% for pu in polling_units %}
                    <option value="{{ pu.uniqueid }}">
                        {{ pu.polling_unit_name }} ({{ pu.uniqueid }})
                    </option>
                {% endfor %}
            </select>

            <button class="btn btn-primary mt-3">
                View Results
            </button>
        </form>

    </div>

</div>

</body>
</html>
